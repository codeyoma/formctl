<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>formctl Procurement Approval Demo</title>
    <style>
      body {
        background: #f3f4f6;
        color: #1f2937;
        font-family: system-ui, sans-serif;
        margin: 2rem;
      }

      dialog {
        border: 1px solid #d1d5db;
        border-radius: 8px;
        box-shadow: 0 24px 70px rgb(15 23 42 / 18%);
        max-width: 44rem;
        padding: 1.5rem;
        position: static;
        width: min(100%, 44rem);
      }

      fieldset {
        border: 1px solid #e5e7eb;
        margin: 1rem 0;
        padding: 1rem;
      }

      legend {
        font-weight: 700;
      }

      label {
        display: block;
        font-weight: 600;
        margin: 1rem 0;
      }

      input,
      select,
      textarea {
        display: block;
        font: inherit;
        margin-top: 0.35rem;
        padding: 0.5rem;
        width: 100%;
      }

      input[type="checkbox"] {
        display: inline-block;
        margin-right: 0.4rem;
        width: auto;
      }

      textarea {
        min-height: 5rem;
      }

      button {
        font: inherit;
        padding: 0.6rem 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>Procurement queue</h1>
    <p>Open approval modal for a two-step internal purchase request.</p>
    <button type="button" name="open-approval">Open approval modal</button>
    <div id="approval-root"></div>
    <template id="approval-template">
      <dialog open aria-label="Procurement approval modal">
        <form method="post" action="/procurement-approval/submit" aria-label="Procurement approval">
          <fieldset data-step="1">
            <legend>Step 1: requester</legend>
            <label>
              Requestor email
              <input name="requestorEmail" type="email" required />
            </label>
            <label>
              Department
              <select name="department" required>
                <option value="engineering">Engineering</option>
                <option value="finance">Finance</option>
                <option value="operations">Operations</option>
              </select>
            </label>
            <label>
              Amount
              <input name="amount" type="number" min="1" required />
            </label>
          </fieldset>
          <fieldset data-step="2">
            <legend>Step 2: approval details</legend>
            <label>
              Needed by
              <input name="neededBy" type="date" required />
            </label>
            <label>
              Justification
              <textarea name="justification" required></textarea>
            </label>
            <label>
              <input name="urgent" type="checkbox" />
              Urgent request
            </label>
          </fieldset>
          <button type="button" name="review-details" disabled>Review entered details</button>
          <div id="submit-root"></div>
        </form>
      </dialog>
    </template>
    <script>
      document.querySelector('button[name="open-approval"]').addEventListener("click", () => {
        const root = document.querySelector("#approval-root");
        if (root.childElementCount > 0) {
          return;
        }

        root.append(document.querySelector("#approval-template").content.cloneNode(true));
        const form = root.querySelector("form");
        const reviewButton = root.querySelector('button[name="review-details"]');
        const submitRoot = root.querySelector("#submit-root");
        const updateReviewState = () => {
          reviewButton.disabled = !form.checkValidity();
        };
        form.addEventListener("input", updateReviewState);
        form.addEventListener("change", updateReviewState);
        reviewButton.addEventListener("click", () => {
          if (submitRoot.childElementCount > 0) {
            return;
          }

          submitRoot.innerHTML = '<button type="submit" name="final-submit">Approve procurement</button>';
        });
      });
    </script>
  </body>
</html>
