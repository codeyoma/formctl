<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>formctl CRM Update Demo</title>
    <style>
      body {
        color: #1f2937;
        font-family: system-ui, sans-serif;
        margin: 2rem;
        max-width: 42rem;
      }

      label {
        display: block;
        font-weight: 600;
        margin: 1rem 0;
      }

      input,
      select,
      textarea {
        display: block;
        font: inherit;
        margin-top: 0.35rem;
        padding: 0.5rem;
        width: 100%;
      }

      input[type="checkbox"] {
        display: inline-block;
        margin-right: 0.4rem;
        width: auto;
      }

      textarea {
        min-height: 5rem;
      }

      button {
        font: inherit;
        padding: 0.6rem 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>CRM account update</h1>
    <form method="post" action="/crm-update/submit" aria-label="CRM account update">
      <label>
        Account name
        <input name="accountName" type="text" required />
      </label>
      <label>
        Pipeline stage
        <select name="stage" required>
          <option value="prospect">Prospect</option>
          <option value="qualified">Qualified</option>
          <option value="renewal">Renewal</option>
          <option value="closed">Closed</option>
        </select>
      </label>
      <label>
        Owner email
        <input name="ownerEmail" type="email" required />
      </label>
      <label>
        Next contact date
        <input name="nextContactDate" type="date" required />
      </label>
      <label>
        <input name="priority" type="checkbox" />
        Priority account
      </label>
      <label>
        Notes
        <textarea name="notes"></textarea>
      </label>
      <button type="submit">Update CRM</button>
    </form>
  </body>
</html>
