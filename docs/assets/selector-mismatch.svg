  <circle cx="92" cy="62" r="8" fill="#f59e0b"/>
  <circle cx="120" cy="62" r="8" fill="#22c55e"/>
  <text x="48" y="114" fill="#38bdf8" font-family="SFMono-Regular, Consolas, monospace" font-size="18">$ formctl submit expense-report --amount 120000 --dry-run --json</text>
  <text x="48" y="158" fill="#fecaca" font-family="SFMono-Regular, Consolas, monospace" font-size="17">{</text>
  <text x="76" y="190" fill="#fecaca" font-family="SFMono-Regular, Consolas, monospace" font-size="17">"status":"error",</text>
  <text x="76" y="222" fill="#fecaca" font-family="SFMono-Regular, Consolas, monospace" font-size="17">"exitCode":3,</text>
