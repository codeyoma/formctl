<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="540" viewBox="0 0 1120 540" role="img" aria-labelledby="title desc">
  <title id="title">formctl selector mismatch screenshot</title>
  <desc id="desc">Terminal-style screenshot showing selector mismatch JSON with exit code 3 and failure artifacts.</desc>
  <rect width="1120" height="540" fill="#111827"/>
  <rect x="28" y="28" width="1064" height="484" rx="8" fill="#1f2937" stroke="#475569" stroke-width="2"/>
