  <text x="76" y="286" fill="#fecaca" font-family="SFMono-Regular, Consolas, monospace" font-size="17">"error":{"code":"selector_mismatch","selector":"input[name=\"amount\"]"},</text>
  <text x="76" y="318" fill="#fecaca" font-family="SFMono-Regular, Consolas, monospace" font-size="17">"artifacts":{</text>
  <text x="104" y="350" fill="#fecaca" font-family="SFMono-Regular, Consolas, monospace" font-size="17">"screenshot":".formctl/runs/1779738550249-failed/failure.png",</text>
  <text x="104" y="382" fill="#fecaca" font-family="SFMono-Regular, Consolas, monospace" font-size="17">"failure":".formctl/runs/1779738550249-failed/failure.json",</text>
  <text x="104" y="414" fill="#fecaca" font-family="SFMono-Regular, Consolas, monospace" font-size="17">"audit":".formctl/runs/1779738550249-failed/audit.jsonl"</text>
